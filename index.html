<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Les Pirates — Morphomagie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;overflow:hidden;position:relative;}
    .bg{position:fixed;inset:0;background:url('bateau-pirate.png.png') center center/cover no-repeat;z-index:0;}
    .parchemin-zone{position:fixed;right:3%;top:50%;transform:translateY(-50%);width:36%;max-width:460px;z-index:10;}
    .parchemin-inner{position:relative;padding:14% 12%;text-align:center;}
    .parchemin-img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:-1;}
    .titre{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:#3d1a00;line-height:1.1;margin-bottom:4px;}
    .titre-sous{font-family:'Cinzel',serif;font-size:0.8rem;color:#7a4a1a;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px;white-space:nowrap;}
    .separateur{display:flex;align-items:center;gap:8px;width:80%;margin:0 auto 16px;}
    .sep-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#8B5E3C,transparent);}
    .sep-losange{width:6px;height:6px;background:#8B5E3C;transform:rotate(45deg);}
    .description{font-family:'Cinzel',serif;font-size:0.75rem;color:#6b3a10;line-height:1.6;margin-bottom:20px;}
    .bouton{font-family:'Cinzel',serif;font-weight:600;font-size:0.9rem;letter-spacing:0.15em;text-transform:uppercase;color:#fff8e7;background:linear-gradient(135deg,#8B3A00,#6b2a00);border:2px solid #F5A623;padding:14px 36px;border-radius:2px;cursor:pointer;transition:all 0.25s;margin-bottom:16px;}
    .bouton:hover{transform:translateY(-2px);}
    .iles-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
    .ile-badge{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;color:#5a2e00;border:1px solid rgba(139,94,60,0.4);padding:4px 10px;border-radius:2px;background:rgba(245,222,179,0.3);}
    .perroquet{position:fixed;bottom:10px;left:10px;width:clamp(120px,14vw,180px);z-index:20;animation:sautiller 3s ease-in-out infinite;mix-blend-mode:darken;}
    @keyframes sautiller{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
    .capitaine{position:fixed;bottom:0;left:38%;width:clamp(140px,16vw,220px);z-index:20;mix-blend-mode:darken;animation:flotter 4s ease-in-out infinite;}
    @keyframes flotter{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="parchemin-zone">
    <div class="parchemin-inner">
      <img class="parchemin-img" src="parchemin.png.png" alt=""/>
      <div class="titre">Les Pirates</div>
      <div class="titre-sous">Morphomagie · L'académie des mots</div>
      <div class="separateur"><div class="sep-line"></div><div class="sep-losange"></div><div class="sep-line"></div></div>
      <div class="description">10 îles · 120 défis<br>une aventure pédagogique</div>
      <button class="bouton">Embarquer</button>
      <div class="iles-grid">
        <div class="ile-badge">Vocabulaire</div>
        <div class="ile-badge">Syllabes</div>
        <div class="ile-badge">Phonèmes</div>
        <div class="ile-badge">Syntaxe</div>
        <div class="ile-badge">Accords</div>
        <div class="ile-badge">Grand Bilan</div>
      </div>
    </div>
  </div>
  <img class="perroquet" src="perroquet.png.png" alt="perroquet"/>
  <img class="capitaine" src="capitaine.png.png" alt="capitaine"/>
</body>
</html>
